{
  "openapi": "3.0.0",
  "info":
    {
      "title": "SIGB API",
      "description": "API REST del Sistema de Gestión Bibliotecaria (SIGB)",
      "version": "1.0.0",
    },
  "servers": [{ "url": "/api/v1", "description": "Servidor de desarrollo" }],
  "paths":
    {
      "/lectores/mi-perfil":
        {
          "get":
            {
              "tags": ["Lectores"],
              "summary": "Obtener mi perfil",
              "description": "Retorna el perfil del lector autenticado a partir del JWT.",
              "operationId": "getMyProfile",
              "security": [{ "bearerAuth": [] }],
              "responses":
                {
                  "200":
                    {
                      "description": "Perfil obtenido correctamente",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/MiPerfilResponse" },
                              "examples":
                                {
                                  "ok":
                                    {
                                      "summary": "Perfil valido",
                                      "value":
                                        {
                                          "data":
                                            {
                                              "nombre": "Juan",
                                              "apellido": "Perez",
                                              "tarjeta": "123456",
                                              "dni": "35111222",
                                              "legajo": "K1234",
                                              "telefono": "2616123456",
                                              "email": "juan.perez@example.com",
                                            },
                                        },
                                    },
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autorizado (token ausente, invalido o expirado)",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "oneOf":
                                    [
                                      { "$ref": "#/components/schemas/UnauthorizedSimpleError" },
                                      { "$ref": "#/components/schemas/ErrorEnvelope" },
                                    ],
                                },
                              "examples":
                                {
                                  "noToken":
                                    {
                                      "summary": "Sin token",
                                      "value": { "error": "Unauthorized." },
                                    },
                                  "invalidToken":
                                    {
                                      "summary": "Token invalido o expirado",
                                      "value": { "error": "Invalid or expired token." },
                                    },
                                },
                            },
                        },
                    },
                  "404":
                    {
                      "description": "Lector no encontrado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/ErrorEnvelope" },
                              "examples":
                                {
                                  "lectorNoEncontrado":
                                    {
                                      "value":
                                        {
                                          "error":
                                            {
                                              "code": "ENTITY_NOT_FOUND",
                                              "message": "Lector no encontrado",
                                            },
                                        },
                                    },
                                },
                            },
                        },
                    },
                  "500":
                    {
                      "description": "Error interno del servidor",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/ErrorEnvelope" },
                              "examples":
                                {
                                  "internal":
                                    {
                                      "value":
                                        {
                                          "error":
                                            {
                                              "code": "INTERNAL_SERVER_ERROR",
                                              "message": "Error interno del servidor",
                                            },
                                        },
                                    },
                                },
                            },
                        },
                    },
                },
            },
        },
      "/lectores/me/reservas":
        {
          "get":
            {
              "tags": ["Reservas"],
              "summary": "Listar reservas activas del lector autenticado",
              "description": "Devuelve las reservas del lector autenticado. El frontend la usa con estado=PENDIENTE para mostrar las reservas activas.",
              "operationId": "getMyActiveReservas",
              "parameters":
                [
                  {
                    "name": "estado",
                    "in": "query",
                    "required": false,
                    "description": "Filtra por estado de la reserva (por ejemplo: PENDIENTE)",
                    "schema": { "type": "string" },
                  },
                  {
                    "name": "page",
                    "in": "query",
                    "required": false,
                    "description": "Número de página",
                    "schema": { "type": "integer", "default": 1 },
                  },
                  {
                    "name": "per_page",
                    "in": "query",
                    "required": false,
                    "description": "Cantidad de elementos por página",
                    "schema": { "type": "integer", "default": 20 },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "description": "Lista paginada de reservas activas",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/ReservasActivasResponse" },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "Parámetro de filtro inválido",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autenticado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno" },
                },
              "security": [{ "bearerAuth": [] }],
            },
        },
      "/reservas/{id}/cancelar":
        {
          "patch":
            {
              "tags": ["Reservas"],
              "summary": "Cancelar una reserva activa",
              "description": "Cancela una reserva del lector autenticado.",
              "operationId": "cancelReserva",
              "parameters":
                [
                  {
                    "name": "id",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "integer" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "description": "Reserva cancelada exitosamente",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "ID inválido",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autenticado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "404":
                    {
                      "description": "Reserva no encontrada",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "422":
                    {
                      "description": "La reserva no puede ser cancelada",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno" },
                },
              "security": [{ "bearerAuth": [] }],
            },
        },
      "/libros/{id}":
        {
          "get":
            {
              "tags": ["Libros"],
              "summary": "Obtener un libro por ID",
              "description": "Primera opción para enriquecer reservas activas con título y autor.",
              "operationId": "getLibroById",
              "parameters":
                [
                  {
                    "name": "id",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "integer" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "description": "Libro encontrado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/LibroResponse" },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "ID inválido",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autenticado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "404":
                    {
                      "description": "Libro no encontrado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno" },
                },
              "security": [{ "bearerAuth": [] }],
            },
        },
      "/articulos/{id}":
        {
          "get":
            {
              "tags": ["Articulos"],
              "summary": "Obtener un artículo por ID",
              "description": "Fallback para enriquecer reservas si /libros/{id} no está disponible.",
              "operationId": "getArticuloById",
              "parameters":
                [
                  {
                    "name": "id",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "integer" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "description": "Artículo encontrado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                { "$ref": "#/components/schemas/ArticuloResponse" },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "ID inválido",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autenticado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "404":
                    {
                      "description": "Artículo no encontrado",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno" },
                },
              "security": [{ "bearerAuth": [] }],
            },
        },
      "/auth/register":
        {
          "post":
            {
              "tags": ["Auth"],
              "summary": "Registrar usuario",
              "description": "Crea un nuevo usuario y su perfil de lector en el sistema",
              "operationId": "7223dba0012f6bca451ffcece59ee54f",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "$ref": "#/components/schemas/UserRegisterRequest",
                            },
                        },
                    },
                },
              "responses":
                {
                  "201":
                    {
                      "description": "Usuario creado exitosamente",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UserRegisterResponse",
                                },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "Datos de entrada no válidos",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "message": { "type": "string" },
                                      "errors": { "type": "object" },
                                    },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "409":
                    {
                      "description": "El usuario ya existe",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "422":
                    {
                      "description": "Error de validación de negocio",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "message": { "type": "string" },
                                      "field": { "type": "string" },
                                    },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno del servidor" },
                },
            },
        },
      "/auth/change-password":
        {
          "post":
            {
              "tags": ["Auth"],
              "summary": "Cambiar contraseña",
              "description": "Actualiza la contraseña del usuario autenticado. Requiere token JWT.",
              "operationId": "98dd9478f733623fe954d7063f5ac859",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "$ref": "#/components/schemas/ChangePasswordRequest",
                            },
                        },
                    },
                },
              "responses":
                {
                  "200":
                    {
                      "description": "Contraseña actualizada correctamente",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "400":
                    {
                      "description": "Datos de entrada no válidos",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "message": { "type": "string" },
                                      "errors": { "type": "object" },
                                    },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "No autenticado o contraseña actual incorrecta",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno del servidor" },
                },
              "security": [{ "bearerAuth": [] }],
            },
        },
      "/auth/login":
        {
          "post":
            {
              "tags": ["Auth"],
              "summary": "Iniciar sesión",
              "description": "Autentica un usuario con DNI y contraseña, retorna un token JWT",
              "operationId": "ce2d3e7f3368922a175515e491a113f0",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            { "$ref": "#/components/schemas/UserLoginRequest" },
                        },
                    },
                },
              "responses":
                {
                  "200":
                    {
                      "description": "Login exitoso",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UserLoginResponse",
                                },
                            },
                        },
                    },
                  "401":
                    {
                      "description": "Credenciales inválidas",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    { "message": { "type": "string" } },
                                  "type": "object",
                                },
                            },
                        },
                    },
                  "500": { "description": "Error interno del servidor" },
                },
            },
        },
    },
  "components":
    {
      "schemas":
        {
          "ReservaItem":
            {
              "properties":
                {
                  "id": { "type": "integer", "example": 1 },
                  "lector_id": { "type": "integer", "example": 3 },
                  "articulo_id": { "type": "integer", "example": 5 },
                  "fecha_inicio":
                    { "type": "string", "format": "date-time", "example": "2026-04-06 10:00:00" },
                  "fecha_vencimiento":
                    { "type": "string", "format": "date-time", "example": "2026-04-09 10:00:00" },
                },
              "type": "object",
            },
          "ReservasActivasResponse":
            {
              "properties":
                {
                  "data":
                    {
                      "type": "array",
                      "items": { "$ref": "#/components/schemas/ReservaItem" },
                    },
                  "pagination":
                    {
                      "properties":
                        {
                          "page": { "type": "integer", "example": 1 },
                          "per_page": { "type": "integer", "example": 20 },
                          "total": { "type": "integer", "example": 1 },
                          "total_pages": { "type": "integer", "example": 1 },
                        },
                      "type": "object",
                    },
                },
              "type": "object",
            },
          "LibroResponse":
            {
              "properties":
                {
                  "data":
                    {
                      "properties":
                        {
                          "id": { "type": "integer", "example": 5 },
                          "personas":
                            {
                              "type": "array",
                              "items":
                                {
                                  "properties":
                                    {
                                      "nombre": { "type": "string", "example": "M." },
                                      "apellido": { "type": "string", "example": "Garcia" },
                                      "rol": { "type": "string", "example": "autor" },
                                      "orden": { "type": "integer", "example": 0 },
                                    },
                                  "type": "object",
                                },
                            },
                          "articulo":
                            {
                              "properties":
                                {
                                  "titulo": { "type": "string", "example": "Introducción al Derecho" },
                                  "anio_publicacion": { "type": "integer", "example": 2023 },
                                },
                              "type": "object",
                            },
                        },
                      "type": "object",
                    },
                },
              "type": "object",
            },
          "ArticuloResponse":
            {
              "properties":
                {
                  "id": { "type": "integer", "example": 5 },
                  "titulo": { "type": "string", "example": "Introducción al Derecho" },
                },
              "type": "object",
            },
          "ChangePasswordRequest":
            {
              "required": ["current_password", "new_password"],
              "properties":
                {
                  "current_password":
                    { "type": "string", "format": "password" },
                  "new_password":
                    {
                      "description": "Mínimo 8 caracteres, una mayúscula, una minúscula y un número",
                      "type": "string",
                      "format": "password",
                    },
                },
              "type": "object",
            },
          "UserLoginRequest":
            {
              "required": ["dni", "password"],
              "properties":
                {
                  "dni":
                    {
                      "description": "DNI del usuario (7-8 dígitos)",
                      "type": "string",
                      "example": "12345678",
                    },
                  "password":
                    {
                      "type": "string",
                      "format": "password",
                      "example": "Password123",
                    },
                },
              "type": "object",
            },
          "UserRegisterRequest":
            {
              "required":
                [
                  "dni",
                  "password",
                  "nombre",
                  "apellido",
                  "fecha_nacimiento",
                  "telefono",
                  "email",
                ],
              "properties":
                {
                  "dni":
                    {
                      "description": "DNI del usuario (7-8 dígitos)",
                      "type": "string",
                      "example": "12345678",
                    },
                  "password":
                    {
                      "description": "Mínimo 8 caracteres, una mayúscula, una minúscula y un número",
                      "type": "string",
                      "format": "password",
                    },
                  "nombre": { "type": "string", "example": "Juan" },
                  "apellido": { "type": "string", "example": "Pérez" },
                  "legajo":
                    { "type": "string", "example": "L12345", "nullable": true },
                  "genero":
                    { "type": "string", "example": "M", "nullable": true },
                  "fecha_nacimiento":
                    {
                      "type": "string",
                      "format": "date",
                      "example": "2000-01-31",
                    },
                  "telefono": { "type": "string", "example": "2615001234" },
                  "email":
                    {
                      "type": "string",
                      "format": "email",
                      "example": "juan.perez@example.com",
                    },
                  "cresta_id": { "type": "string", "nullable": true },
                },
              "type": "object",
            },
          "UserLoginResponse":
            {
              "required": ["token"],
              "properties":
                {
                  "token":
                    {
                      "description": "Token JWT de autenticación",
                      "type": "string",
                    },
                },
              "type": "object",
            },
          "UserRegisterResponse":
            {
              "required": ["userId", "lectorId", "fullName"],
              "properties":
                {
                  "userId": { "type": "integer", "example": 1 },
                  "lectorId": { "type": "integer", "example": 1 },
                  "fullName": { "type": "string", "example": "Juan Pérez" },
                },
              "type": "object",
            },
          "MiPerfilResponse":
            {
              "required": ["data"],
              "properties":
                {
                  "data": { "$ref": "#/components/schemas/LectorPerfilData" },
                },
              "type": "object",
            },
          "LectorPerfilData":
            {
              "required": ["nombre", "apellido", "tarjeta", "dni", "telefono", "email"],
              "properties":
                {
                  "nombre": { "type": "string", "example": "Juan" },
                  "apellido": { "type": "string", "example": "Perez" },
                  "tarjeta": { "type": "string", "example": "123456" },
                  "dni": { "type": "string", "example": "35111222" },
                  "legajo": { "type": "string", "nullable": true, "example": "K1234" },
                  "telefono": { "type": "string", "example": "2616123456" },
                  "email": { "type": "string", "format": "email", "example": "juan.perez@example.com" },
                },
              "type": "object",
            },
        },
      "securitySchemes":
        {
          "bearerAuth":
            {
              "type": "http",
              "description": "Token JWT obtenido en el endpoint de login",
              "bearerFormat": "JWT",
              "scheme": "bearer",
            },
        },
    },
  "tags": [{ "name": "Auth", "description": "Auth" }],
}
